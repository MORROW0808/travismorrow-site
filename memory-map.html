<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- ===== travismorrow.com access guard (added to the DEPLOYED copy only; the Dropbox source Demo/Taylor-Memory-Map.html is untouched) ===== -->
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  /* Runs before <body> paints: bounce to login.html if this browser
     session has not unlocked. Client-side only — see README. */
  TMAuth.guard();
</script>
<script src="theme.js"></script>
<script>TMTheme.init();</script>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>TAYLOR — memory map</title>
<style>
  :root{
    --bg:#141414; /* NSS/AFAM charcoal theme — brand chrome only, node palette unchanged */
    --panel-bg:rgba(33,33,33,0.92);
    --panel-border:rgba(255,255,255,0.08);
    --text-main:#d2d2d2;
    --text-dim:#9c9c9c;
    --text-bright:#f2f2f2;

    /* hub = Taylor: wears the reticle mark (gunmetal plate, cyan lamp) */
    --hub-base:#3a434d;   --hub-fill:#1a1f24;   --hub-glow:#5AC8FA;
    --mk-ring:#3a434d; --mk-tick:#59636e; --mk-tick2:#454f5a;
    --mk-arc:#8b96a1;  --mk-ink:#eef2f6;  --mk-lamp:#5AC8FA; --mk-core:#9FD8FF;
    --teal-base:#0e7490;  --teal-fill:#22b8cf;
    --amber-base:#b45309; --amber-fill:#f5a524;
    --grey-base:#6b7280;  --grey-fill:#8b98a5;
    --steel-fill:#6ea8d8;
    --violet-fill:#b18ae0;
    --green-base:#15803d; --green-fill:#3fb950;

    --status-live:#3fb950;
    --status-limited:#f5a524;
    --status-planned:#8b98a5;
    --status-seasonal:#22b8cf;
    --status-done:#6ea8d8;

    --edge-data:#22b8cf;
    --edge-workaround:#f5a524;
    --edge-route:#8b98a5;
  }
  /* ---------- light mode ----------
     Node/status/edge palette is kept except the two greys (planned nodes,
     route edges) and the workaround amber, which sit too faint on a light
     surface and are darkened for legibility — same hue families. */
  :root[data-theme="light"]{
    --bg:#EFEFEC;
    --panel-bg:rgba(255,255,255,0.94);
    --panel-border:#D9DBDE;
    --text-main:#33363B;
    --text-dim:#6B6E73;
    --text-bright:#111318;
    --grey-fill:#6e7681;
    --status-planned:#6e7681;
    --edge-route:#848e98;
    --edge-workaround:#c08a1e;
    --hub-base:#8a9096;   --hub-fill:#ffffff;   --hub-glow:#0B7FA8;
    --mk-ring:#b9bec4; --mk-tick:#8a9096; --mk-tick2:#b9bec4;
    --mk-arc:#5c646c;  --mk-ink:#14181c;  --mk-lamp:#0B7FA8; --mk-core:#0B7FA8;
  }
  :root[data-theme="light"] #vignette{
    background: radial-gradient(ellipse at 50% 45%, rgba(255,255,255,0.5) 0%, rgba(239,239,236,0) 55%),
                radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 45%, rgba(0,0,0,0.10) 100%);
  }
  :root[data-theme="light"] #depthGlow{ opacity:.45; }
  :root[data-theme="light"] button.ctrl-btn{ background:rgba(0,0,0,0.04); }
  :root[data-theme="light"] button.ctrl-btn:hover{ background:rgba(0,0,0,0.08); }
  :root[data-theme="light"] button#growBtn{
    background:linear-gradient(180deg, rgba(185,39,50,0.14), rgba(182,32,37,0.07));
    border-color:rgba(185,39,50,0.5); color:#B92732;
  }
  :root[data-theme="light"] button#growBtn:hover{
    background:linear-gradient(180deg, rgba(185,39,50,0.22), rgba(182,32,37,0.12));
  }
  :root[data-theme="light"] input#searchBox{ background:rgba(0,0,0,0.04); }
  :root[data-theme="light"] #searchResults div{ border-bottom-color:rgba(0,0,0,0.06); }
  :root[data-theme="light"] #legend .lg-sep{ background:rgba(0,0,0,0.10); }
  :root[data-theme="light"] #panel .p-conn-item{ background:rgba(0,0,0,0.03); }
  :root[data-theme="light"] #stageLabel .sl-ver{ color:rgba(51,54,59,0.55); }
  :root[data-theme="light"] #stageLabel .sl-txt{ color:rgba(107,110,115,0.9); }
  :root[data-theme="light"] #stageLabel{
    background:radial-gradient(ellipse at center, rgba(239,239,236,0.8) 0%, rgba(239,239,236,0) 75%);
  }
  #themeBtn svg{ width:13px; height:13px; display:block; }
  :root[data-theme="dark"] #themeBtn .icon-moon{ display:none; }
  :root[data-theme="light"] #themeBtn .icon-sun{ display:none; }
  html.theme-anim body, html.theme-anim body *{
    transition:background-color .35s ease, color .35s ease,
               border-color .35s ease, fill .35s ease, stroke .35s ease !important;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--bg);
    font-family:-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text-main);
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }
  #app{ position:relative; width:100vw; height:100vh; }

  /* pointer-depth brand glow (see markup note) */
  #depthGlow{
    position:absolute; inset:-12%; pointer-events:none; z-index:0;
    background:radial-gradient(ellipse 46% 38% at 50% 34%,
      rgba(185,39,50,0.10) 0%, rgba(182,32,37,0.04) 45%, rgba(20,20,20,0) 70%);
    will-change:transform;
  }

  /* radial vignette */
  #vignette{
    position:absolute; inset:0; pointer-events:none; z-index:1;
    background: radial-gradient(ellipse at 50% 45%, rgba(48,40,40,0.35) 0%, rgba(20,20,20,0) 55%),
                radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
  }

  svg#graph{
    position:absolute; inset:0; width:100%; height:100%; z-index:2;
    cursor:grab;
  }
  svg#graph.panning{ cursor:grabbing; }

  .node-label{
    font-size:10px; fill:var(--text-main); pointer-events:none;
    font-family:-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .node-label.hub{ font-size:14px; font-weight:700; fill:var(--text-bright); }
  .node-circle{ cursor:pointer; }
  .node-group{ }

  .edge-line{ pointer-events:none; stroke-width:var(--edge-w, 1.2px); }

  /* ---------- Top bar ---------- */
  #topbar{
    position:absolute; top:0; left:0; right:0; z-index:10;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px; pointer-events:none;
  }
  #title-block{ pointer-events:auto; }
  #title-block .t1{
    font-size:15px; font-weight:700; letter-spacing:0.5px; color:var(--text-bright);
  }
  #title-block .t2{
    font-size:11px; color:var(--text-dim); margin-top:2px;
  }
  #controls{
    display:flex; gap:8px; align-items:center; pointer-events:auto;
    flex-wrap:wrap; justify-content:flex-end;
  }
  a.ctrl-btn{
    text-decoration:none; display:inline-flex; align-items:center;
  }
  a.ctrl-btn, button.ctrl-btn{
    font-family:inherit; font-size:12px; font-weight:600;
    padding:7px 14px; border-radius:6px; border:1px solid var(--panel-border);
    background:rgba(255,255,255,0.04); color:var(--text-main);
    cursor:pointer; transition:background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color:transparent;
  }
  a.ctrl-btn:hover, button.ctrl-btn:hover{ background:rgba(255,255,255,0.09); }
  button#growBtn{
    background:linear-gradient(180deg, rgba(185,39,50,0.30), rgba(182,32,37,0.14));
    border-color:rgba(185,39,50,0.55); color:#ffd9dc;
  }
  button#growBtn:hover{ background:linear-gradient(180deg, rgba(185,39,50,0.44), rgba(182,32,37,0.22)); }
  #searchWrap{ position:relative; }
  input#searchBox{
    font-family:inherit; font-size:12px;
    padding:7px 10px; border-radius:6px; border:1px solid var(--panel-border);
    background:rgba(255,255,255,0.04); color:var(--text-main);
    width:130px; outline:none;
  }
  input#searchBox:focus{ border-color:rgba(222,89,100,0.6); width:170px; }
  #searchResults{
    position:absolute; top:32px; right:0; width:220px;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px;
    max-height:220px; overflow-y:auto; display:none; z-index:20;
    backdrop-filter: blur(6px);
  }
  #searchResults div{
    padding:7px 10px; font-size:12px; cursor:pointer; color:var(--text-main);
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  #searchResults div:last-child{ border-bottom:none; }
  #searchResults div:hover{ background:rgba(185,39,50,0.18); }
  #searchResults div .sr-group{ color:var(--text-dim); font-size:10px; }

  /* ---------- Legend ---------- */
  #legend{
    position:absolute; left:14px; bottom:14px; z-index:10;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:10px;
    padding:10px 12px; font-size:10.5px; color:var(--text-dim);
    max-width:210px; backdrop-filter: blur(6px);
    pointer-events:auto;
  }
  #legend .lg-title{ font-size:10px; font-weight:700; color:var(--text-main); margin-bottom:6px; letter-spacing:0.4px; text-transform:uppercase; }
  #legend .lg-row{ display:flex; align-items:center; gap:6px; margin:3px 0; }
  #legend .lg-dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  #legend .lg-line{ width:16px; height:0; border-top:2px solid; flex:0 0 auto; }
  #legend .lg-sep{ height:1px; background:rgba(255,255,255,0.08); margin:6px 0; }
  #legend.collapsed .lg-body{ display:none; }
  #legend .lg-toggle{ position:absolute; top:8px; right:10px; cursor:pointer; color:var(--text-dim); font-size:11px; }

  /* ---------- Ticker ---------- */
  #ticker{
    position:absolute; right:14px; bottom:14px; z-index:10;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px;
    padding:7px 12px; font-size:11px; color:var(--text-dim);
    backdrop-filter: blur(6px);
  }

  /* ---------- Stage label for Grow ---------- */
  #stageLabel{
    position:absolute; left:50%; bottom:110px; transform:translateX(-50%);
    z-index:11; text-align:center; pointer-events:none;
    opacity:0; transition:opacity 0.4s ease;
    padding:6px 18px; border-radius:10px;
    background:radial-gradient(ellipse at center, rgba(20,20,20,0.55) 0%, rgba(20,20,20,0) 75%);
  }
  #stageLabel.show{ opacity:1; }
  #stageLabel .sl-ver{ font-size:26px; font-weight:800; color:rgba(210,210,210,0.5); letter-spacing:1px; }
  #stageLabel .sl-txt{ font-size:13px; color:rgba(156,156,156,0.85); margin-top:2px; }

  /* ---------- Kiosk / ambient loop mode (?loop or ?kiosk) ----------
     Only active when the URL carries the param; the default page never
     gets the body.kiosk class, so none of this applies to normal visits. */
  svg#graph{ transition:opacity 1.05s ease; }
  @keyframes hubPulse{ 0%,100%{opacity:1;} 50%{opacity:.72;} }
  @keyframes arcSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes auroraA{
    0%,100%{ transform:translate3d(-2%,-1%,0) scale(1); }
    50%{ transform:translate3d(2.5%,2%,0) scale(1.08); }
  }
  body.kiosk .node-group[data-id="taylor"] circle.node-circle{
    animation:hubPulse 5.5s ease-in-out infinite;
  }
  body.kiosk .mk-arc{
    animation:arcSpin 70s linear infinite;
    transform-origin:60px 60px;
  }
  body.kiosk #depthGlow{ animation:auroraA 40s ease-in-out infinite; }
  body.kiosk .node-label{ font-size:12.5px; }
  body.kiosk .node-label.hub{ font-size:17px; }
  body.kiosk #stageLabel .sl-ver{ font-size:42px; }
  body.kiosk #stageLabel .sl-txt{ font-size:17px; letter-spacing:.03em; }
  body.kiosk.cursor-idle, body.kiosk.cursor-idle *{ cursor:none !important; }

  /* ---------- Side panel ---------- */
  #panel{
    position:absolute; top:0; right:0; height:100%; width:300px; max-width:88vw;
    background:var(--panel-bg); border-left:1px solid var(--panel-border);
    z-index:15; transform:translateX(100%); transition:transform 0.28s ease;
    overflow-y:auto; backdrop-filter: blur(10px);
    pointer-events:auto;
  }
  #panel.open{ transform:translateX(0); }
  #panel .p-inner{ padding:20px 18px 30px; }
  #panel .p-close{
    position:absolute; top:12px; right:14px; cursor:pointer; font-size:18px;
    color:var(--text-dim); line-height:1; padding:4px;
  }
  #panel .p-close:hover{ color:var(--text-bright); }
  #panel .p-name{ font-size:18px; font-weight:700; color:var(--text-bright); margin:2px 26px 8px 0; }
  #panel .p-chip{
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.4px;
    padding:3px 9px; border-radius:20px; margin-bottom:12px; text-transform:uppercase;
  }
  #panel .p-blurb{ font-size:13px; line-height:1.55; color:var(--text-main); margin-bottom:14px; }
  #panel .p-ver{ font-size:11px; color:var(--text-dim); margin-bottom:16px; }
  #panel .p-conn-title{
    font-size:10.5px; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:0.4px; margin-bottom:8px; border-top:1px solid var(--panel-border); padding-top:14px;
  }
  #panel .p-conn-list{ display:flex; flex-direction:column; gap:4px; }
  #panel .p-conn-item{
    font-size:12.5px; color:var(--text-main); cursor:pointer; padding:5px 8px;
    border-radius:5px; background:rgba(255,255,255,0.03);
    display:flex; align-items:center; gap:7px;
  }
  #panel .p-conn-item:hover{ background:rgba(185,39,50,0.17); color:var(--text-bright); }
  #panel .p-conn-dot{ width:7px; height:7px; border-radius:50%; flex:0 0 auto; }

  /* ---------- hover preview card ---------- */
  #hoverCard{
    position:fixed; z-index:9; max-width:264px; pointer-events:none;
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:10px; padding:12px 14px 11px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    opacity:0; transform:translateY(6px) scale(.98);
    transition:opacity .18s ease, transform .18s ease, visibility .18s;
    visibility:hidden;
  }
  #hoverCard.show{ opacity:1; transform:translateY(0) scale(1); visibility:visible; }
  :root[data-theme="light"] #hoverCard{ box-shadow:0 10px 30px rgba(16,18,20,0.16); }
  #hoverCard .hc-head{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  #hoverCard .hc-dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  #hoverCard .hc-name{ font-size:13px; font-weight:700; color:var(--text-bright); min-width:0; }
  #hoverCard .hc-status{
    font-size:9.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
    padding:2px 7px; border-radius:999px; margin-left:auto; flex:none;
  }
  #hoverCard .hc-blurb{
    font-size:11.5px; line-height:1.5; color:var(--text-main); margin-bottom:7px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  #hoverCard .hc-meta{ font-size:10px; color:var(--text-dim); display:flex; gap:10px; }
  #hoverCard .hc-hint{ font-size:9.5px; color:var(--text-dim); opacity:.75; margin-top:5px; }

  /* overlay for closing panel by tapping background on mobile */
  #panelOverlay{
    position:absolute; inset:0; z-index:14; display:none;
  }
  #panelOverlay.show{ display:block; }

  /* ---------- Mobile bottom sheet ---------- */
  @media (max-width:640px){
    #panel{
      top:auto; bottom:0; left:0; right:0; width:100%; max-width:100%; height:62vh;
      border-left:none; border-top:1px solid var(--panel-border);
      border-radius:14px 14px 0 0;
      transform:translateY(100%);
    }
    #panel.open{ transform:translateY(0); }
    #title-block .t2{ display:none; }
    #title-block .t1{ font-size:12px; }
    #topbar{ padding:10px 8px; align-items:flex-start; }
    #controls{ gap:5px; }
    a.ctrl-btn{
    text-decoration:none; display:inline-flex; align-items:center;
  }
  a.ctrl-btn, button.ctrl-btn{ padding:6px 9px; font-size:11px; white-space:nowrap; }
    input#searchBox{ width:56px; padding:6px 8px; }
    input#searchBox:focus{ width:104px; }
    #searchResults{ width:190px; }
    /* Legend sizing on mobile; starting collapsed state is set at init via JS (see LEGEND TOGGLE) */
    #legend{ max-width:150px; font-size:9.5px; padding:8px 30px 8px 10px; bottom:10px; left:10px; }
    /* Ticker hidden on mobile — no room in the top bar without crowding Grow/Reset */
    #ticker{ display:none; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- pointer-depth brand glow: the map is a full-viewport pan/zoom canvas
       (no page scroll), so instead of scroll parallax it gets a subtle
       pointer-tracked depth layer. Sits behind the vignette + graph,
       pointer-events:none, disabled under prefers-reduced-motion. -->
  <div id="depthGlow"></div>
  <div id="vignette"></div>
  <svg id="graph" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-soft" x="-150%" y="-150%" width="400%" height="400%">
        <feGaussianBlur stdDeviation="3.2" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="glow-strong" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur stdDeviation="7" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="glow-hub" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur stdDeviation="10" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <g id="viewport">
      <g id="edgeLayer"></g>
      <g id="nodeLayer"></g>
    </g>
  </svg>

  <div id="topbar">
    <div id="title-block">
      <div class="t1">TAYLOR — memory map</div>
      <div class="t2" id="subtitleText"></div>
    </div>
    <div id="controls">
      <div id="searchWrap">
        <input id="searchBox" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
        <div id="searchResults"></div>
      </div>
      <a class="ctrl-btn" href="portfolio.html">Dashboard</a>
      <a class="ctrl-btn" href="map.html">Facility map</a>
      <button class="ctrl-btn" id="growBtn">⟲ Grow</button>
      <button class="ctrl-btn" id="resetBtn">Reset</button>
      <button class="ctrl-btn" id="lockBtn" title="Lock this session and return to the landing page">Lock</button>
      <button class="ctrl-btn" id="themeBtn" title="Toggle light / dark mode" aria-label="Toggle light or dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="stageLabel">
    <div class="sl-ver" id="stageVer"></div>
    <div class="sl-txt" id="stageTxt"></div>
  </div>

  <div id="legend">
    <span class="lg-toggle" id="legendToggle">−</span>
    <div class="lg-title">Legend</div>
    <div class="lg-body">
      <div class="lg-row"><span class="lg-dot" style="background:var(--hub-glow)"></span>Hub</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--teal-fill)"></span>Sources / access</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--amber-fill)"></span>Workarounds / memory</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--grey-fill)"></span>Routing / delivery / surfaces</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--steel-fill)"></span>Business workstreams</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--violet-fill)"></span>Personal workstreams</div>
      <div class="lg-row"><span class="lg-dot" style="background:var(--green-fill)"></span>Skills</div>
      <div class="lg-sep"></div>
      <div class="lg-row"><span class="lg-line" style="border-color:var(--edge-data)"></span>Data path</div>
      <div class="lg-row"><span class="lg-line" style="border-color:var(--edge-workaround)"></span>Workaround</div>
      <div class="lg-row"><span class="lg-line" style="border-color:var(--edge-route)"></span>Route / delivery</div>
    </div>
  </div>

  <div id="ticker"></div>

  <div id="panelOverlay"></div>
  <div id="hoverCard" role="tooltip" aria-hidden="true"></div>
  <div id="panel">
    <div class="p-close" id="panelClose">✕</div>
    <div class="p-inner">
      <div class="p-name" id="p-name"></div>
      <div class="p-chip" id="p-chip"></div>
      <div class="p-blurb" id="p-blurb"></div>
      <div class="p-ver" id="p-ver"></div>

function hashStr(s){
  var h=0;
  for(var i=0;i<s.length;i++){ h = ((h<<5)-h + s.charCodeAt(i))|0; }
  return Math.abs(h) % 200;
}

  var id=r[0], label=r[1], group=r[2], status=r[3], ver=r[4], blurb=r[5];
  var seed = SEED[group] || {x:0,y:0};
  // jitter so same-group nodes don't stack exactly
  var jitterX = (hashStr(id) % 200 - 100);
  var jitterY = ((hashStr(id+"y")) % 200 - 100);
  return {
    id:id, label:label, group:group, status:status, ver:ver, blurb:blurb,
    r: GROUP_RADIUS[group] || 8,
    homeX: seed.x + jitterX*0.9,
    homeY: seed.y + jitterY*0.9,

/* Semantic zoom: past 1x, node groups (circle + label) counter-scale by
   camScale^-0.45 while world spacing grows linearly with camScale — so
   deeper zoom = more separation between labels, not the same crowding
   magnified. Edges get the same treatment via the --edge-w CSS var. */
function nodeCounterScale(){
  return camScale <= 1 ? 1 : Math.pow(camScale, -0.45);
}
function positionAll(){
  var cs = nodeCounterScale();
  nodes.forEach(function(n){
    n.el.setAttribute("transform","translate("+n.x+","+n.y+")" +
      (cs === 1 ? "" : " scale("+cs.toFixed(4)+")"));
    n.el.style.display = n.visible ? "" : "none";
  });
  if (hoverId) placeHoverCard();
  edges.forEach(function(e){
    var a=nodeById[e.a], b=nodeById[e.b];
    if(!e.visible || !a.visible || !b.visible){
      e.el.style.display="none"; return;
    }
    e.el.style.display="";
    e.el.setAttribute("x1",a.x); e.el.setAttribute("y1",a.y);
    e.el.setAttribute("x2",b.x); e.el.setAttribute("y2",b.y);
  });
}

var SIM = {
  repulsion: 3120,   // +20% vs original 2600 — gives breathing room around the crowded hub ring
  springLen: 106,     // +18% vs original 90
  springK: 0.045,
  centerK: 0.0018,
  homeK: 0.045,
  damping: 0.86,
  collisionPad: 4,
  maxSpeed: 40
};

function simTick(activeNodes){
  var n = activeNodes;
  var i,j;
  var driftT = performance.now()/1000;
  // pairwise repulsion O(n^2) -- fine for ~80 nodes
  for(i=0;i<n.length;i++){
    var a = n[i];
    if(a.fixed) continue;
    var fx=0, fy=0;
    for(j=0;j<n.length;j++){
      if(i===j) continue;
      var b = n[j];
      var dx = a.x-b.x, dy = a.y-b.y;
      var distSq = dx*dx+dy*dy;
      if(distSq<0.01) { dx=(Math.random()-0.5); dy=(Math.random()-0.5); distSq=dx*dx+dy*dy; }
      var dist = Math.sqrt(distSq);
      var minDist = a.r+b.r+SIM.collisionPad;
      var force;
      if(dist < minDist){
        // collision push
        force = SIM.repulsion / Math.max(distSq,100) + (minDist-dist)*2;
      } else {
        force = SIM.repulsion / Math.max(distSq, 400);
      }
      fx += (dx/dist)*force;
      fy += (dy/dist)*force;
    }
    a._fx = fx; a._fy = fy;
  }
  // springs
  edges.forEach(function(e){
    if(!e.visible) return;
    var a=nodeById[e.a], b=nodeById[e.b];
    if(!a.visible || !b.visible) return;
    if(a._fx===undefined) return;
    var dx = b.x-a.x, dy=b.y-a.y;
    var dist = Math.sqrt(dx*dx+dy*dy) || 0.01;
    var stretch = dist - SIM.springLen;
    var force = stretch * SIM.springK;
    var fx = (dx/dist)*force, fy=(dy/dist)*force;
    if(!a.fixed){ a._fx += fx; a._fy += fy; }
    if(!b.fixed){ b._fx -= fx; b._fy -= fy; }
  });
  // centering gravity + home-position force + integrate
  for(i=0;i<n.length;i++){
    var node = n[i];
    if(node.fixed){ node.vx=0; node.vy=0; continue; }
    var cfx = -node.x*SIM.centerK;
    var cfy = -node.y*SIM.centerK;
    var hx = node.homeX, hy = node.homeY;
    if(KIOSK && node.group!=="hub" && node.driftP1!==undefined){
      // ambient idle drift: home targets orbit slowly so the map breathes
      hx += Math.sin(driftT*0.22 + node.driftP1) * 14;
      hy += Math.cos(driftT*0.17 + node.driftP2) * 12;
    }
    var hfx = (hx-node.x)*SIM.homeK;
    var hfy = (hy-node.y)*SIM.homeK;
    var totalFx = (node._fx||0) + cfx + hfx;
    var totalFy = (node._fy||0) + cfy + hfy;
    node.vx = (node.vx + totalFx*0.016) * SIM.damping;
    node.vy = (node.vy + totalFy*0.016) * SIM.damping;
    var speed = Math.sqrt(node.vx*node.vx+node.vy*node.vy);
    if(speed>SIM.maxSpeed){ node.vx = node.vx/speed*SIM.maxSpeed; node.vy=node.vy/speed*SIM.maxSpeed; }
    node.x += node.vx;
    node.y += node.vy;
  }
}

function activeNodeList(){
  return nodes.filter(function(n){ return n.visible; });
}

var running = true;
var lastFrameTime = 0;
var kioskTick = null;    // kiosk FX frame hook (particles, pulses, camera breathe)
var kioskFxBurst = null; // kiosk node-birth particle burst hook

function frame(ts){
  if(running){
    var an = activeNodeList();
    simTick(an);
    positionAll();
    updateEdgeHighlight();
    if(kioskTick) kioskTick(ts);
  }
  requestAnimationFrame(frame);
}

/* Pre-warm before first paint */
function prewarm(steps){
  var an = activeNodeList();
  for(var s=0;s<steps;s++){
    simTick(an);
  }
}

/* =========================================================
   4. CAMERA: PAN / ZOOM / DRAG (Pointer Events)
   ========================================================= */

var pointers = {}; // id -> {x,y}
var dragNode = null;
var isPanning = false;
var panStart = null;
var camStart = null;
var pinchStartDist = null;
var pinchStartScale = null;
var pinchMidWorld = null;
var didDrag = false;

function getSvgPoint(evt){
  var rect = svg.getBoundingClientRect();
  return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
}

svg.addEventListener("pointerdown", function(evt){
  var pt = getSvgPoint(evt);
  pointers[evt.pointerId] = pt;
  didDrag = false;

  var targetGroup = evt.target.closest ? evt.target.closest(".node-group") : null;
  var nodeCount = Object.keys(pointers).length;

  if(nodeCount===1 && targetGroup){
    var id = targetGroup.getAttribute("data-id");
    var n = nodeById[id];
    dragNode = n;
    n.fixed = true;
    svg.setPointerCapture(evt.pointerId);
  } else if(nodeCount===1){
    isPanning = true;
    panStart = pt;
    camStart = { x:camX, y:camY };
    svg.classList.add("panning");
    svg.setPointerCapture(evt.pointerId);
  } else if(nodeCount===2){
    isPanning = false;
    dragNode = null;
    var ids = Object.keys(pointers);
    var p1 = pointers[ids[0]], p2 = pointers[ids[1]];
    pinchStartDist = Math.hypot(p2.x-p1.x, p2.y-p1.y) || 1;
    pinchStartScale = camScale;
    var midScreen = { x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2 };
    pinchMidWorld = screenToWorld(midScreen.x, midScreen.y);
  }
});

svg.addEventListener("pointermove", function(evt){
  if(!pointers[evt.pointerId]) return;
  var pt = getSvgPoint(evt);
  pointers[evt.pointerId] = pt;
  var nodeCount = Object.keys(pointers).length;

  if(nodeCount>=2){
    var ids = Object.keys(pointers);
    var p1 = pointers[ids[0]], p2 = pointers[ids[1]];
    var dist = Math.hypot(p2.x-p1.x, p2.y-p1.y) || 1;
    if(pinchStartDist){
      var scale = pinchStartScale * (dist/pinchStartDist);
      scale = Math.max(0.15, Math.min(4, scale));
      camScale = scale;
      var midScreen = { x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2 };
      var midWorldNow = screenToWorld(midScreen.x, midScreen.y);
      camX += (pinchMidWorld.x - midWorldNow.x);
      camY += (pinchMidWorld.y - midWorldNow.y);
      applyTransform();
    }
    return;
  }

  if(dragNode){
    didDrag = true;
    var world = screenToWorld(pt.x, pt.y);
    dragNode.x = world.x; dragNode.y = world.y;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if(isPanning){
    var dx = (pt.x - panStart.x)/camScale;
    var dy = (pt.y - panStart.y)/camScale;
    if(Math.abs(dx)>2 || Math.abs(dy)>2) didDrag = true;
    camX = camStart.x - dx;
    camY = camStart.y - dy;
    applyTransform();
  }
});

function endPointer(evt){
  delete pointers[evt.pointerId];
  var nodeCount = Object.keys(pointers).length;
  if(nodeCount<2){ pinchStartDist=null; }

  if(dragNode){
    dragNode.fixed = false;
    if(!didDrag){
      selectNode(dragNode.id);
    }
    dragNode = null;
  } else if(isPanning){
    isPanning = false;
    svg.classList.remove("panning");
    if(!didDrag){
      // background tap: close panel
      closePanel();
    }
  }
}
svg.addEventListener("pointerup", endPointer);
svg.addEventListener("pointercancel", endPointer);

svg.addEventListener("wheel", function(evt){
  evt.preventDefault();
  var pt = getSvgPoint(evt);
  var worldBefore = screenToWorld(pt.x, pt.y);
  var delta = -evt.deltaY * 0.0016;
  camScale = Math.max(0.15, Math.min(4, camScale * (1+delta)));
  var worldAfter = screenToWorld(pt.x, pt.y);
  camX += (worldBefore.x - worldAfter.x);
  camY += (worldBefore.y - worldAfter.y);
  applyTransform();
}, { passive:false });

/* =========================================================
   5. SELECTION / HIGHLIGHT / PANEL
   ========================================================= */

var selectedId = null;

/* Grow-replay reveal fade: items stamped with a bornAt timestamp fade from
   0 to their base opacity over 650ms (bornAt may sit in the future so the
   fade can be staggered). Items without bornAt render at base opacity. */
function revealOpacity(item, base){
  if(!item.bornAt) return base;
  var t = (performance.now() - item.bornAt) / 650;
  if(t >= 1){ item.bornAt = 0; return base; }
  return Math.max(0, base * t);
}

function updateEdgeHighlight(){
  if(!selectedId){
    edges.forEach(function(e){
      if(!e.visible) return;
      e.el.setAttribute("opacity", revealOpacity(e, 0.45));
      e.el.setAttribute("stroke-width","1.2");
    });
    nodes.forEach(function(n){
      var o = revealOpacity(n, 1);
      n.circleEl.setAttribute("opacity", o);
      n.labelEl.setAttribute("opacity", o);
      n.circleEl.setAttribute("filter", n.baseFilter);
    });
    return;
  }
  var neigh = {};
  neigh[selectedId]=true;
  (neighbors[selectedId]||[]).forEach(function(id){ neigh[id]=true; });

  edges.forEach(function(e){
    if(!e.visible) return;
    var involved = (e.a===selectedId || e.b===selectedId);
    e.el.setAttribute("opacity", involved ? "0.95" : "0.12");
    e.el.setAttribute("stroke-width", involved ? "2" : "1.2");
  });
  nodes.forEach(function(n){
    var dim = !neigh[n.id];
    n.circleEl.setAttribute("opacity", dim ? "0.22" : "1");
    n.labelEl.setAttribute("opacity", dim ? "0.22" : "1");
    n.circleEl.setAttribute("filter", n.id===selectedId ? "url(#glow-strong)" : n.baseFilter);
  });
}

function selectNode(id){
  selectedId = id;
  openPanel(id);
  updateEdgeHighlight();
}

function easeCameraTo(targetX, targetY, targetScale, duration){
  var startX=camX, startY=camY, startScale=camScale;
  var t0 = performance.now();
  duration = duration || 500;
  function step(now){
    var t = Math.min(1, (now-t0)/duration);
    var e = 1 - Math.pow(1-t, 3); // ease-out cubic
    camX = startX + (targetX-startX)*e;
    camY = startY + (targetY-startY)*e;
    camScale = startScale + (targetScale-startScale)*e;
    applyTransform();
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

var panelEl = document.getElementById("panel");
var panelOverlay = document.getElementById("panelOverlay");

function openPanel(id){
  var n = nodeById[id];
  document.getElementById("p-name").textContent = n.label;
  var chip = document.getElementById("p-chip");
  chip.textContent = n.status;
  chip.style.background = "rgba(255,255,255,0.08)";
  chip.style.color = STATUS_COLOR[n.status] || "#fff";
  chip.style.border = "1px solid " + (STATUS_COLOR[n.status]||"#fff");
  document.getElementById("p-blurb").textContent = n.blurb;
  document.getElementById("p-ver").textContent = "Added in " + (VER_LABEL[n.ver] || ("v"+n.ver));

  var list = document.getElementById("p-conn-list");
  list.innerHTML = "";
  var neigh = neighbors[id] || [];
  var seen = {};
  neigh.forEach(function(nid){
    if(seen[nid]) return; seen[nid]=true;
    var nn = nodeById[nid];
    if(!nn) return;
    var item = document.createElement("div");
    item.className = "p-conn-item";
    var dot = document.createElement("span");
    dot.className = "p-conn-dot";
    dot.style.background = GROUP_COLOR[nn.group].fill;
    item.appendChild(dot);
    var txt = document.createElement("span");
    txt.textContent = nn.label;
    item.appendChild(txt);
    item.addEventListener("click", function(){
      selectNode(nid);
      focusCameraOn(nid);
    });
    list.appendChild(item);
  });

  panelEl.classList.add("open");
  panelOverlay.classList.add("show");
}

function closePanel(){
  panelEl.classList.remove("open");
  panelOverlay.classList.remove("show");
  selectedId = null;
  updateEdgeHighlight();
}

document.getElementById("panelClose").addEventListener("click", closePanel);
panelOverlay.addEventListener("pointerdown", function(){ closePanel(); });

function focusCameraOn(id){
  var n = nodeById[id];
  easeCameraTo(n.x, n.y, Math.max(camScale, 1.1), 550);
}

/* =========================================================
   9. GROW REPLAY
   ========================================================= */

var growRunning = false;
var onGrowComplete = null;          // kiosk loop hook, set only in kiosk mode
var STAGE_MS = KIOSK ? 2600 : 1600; // slower stage cadence for big-screen kiosk
var stageLabelEl = document.getElementById("stageLabel");
var stageVerEl = document.getElementById("stageVer");
var stageTxtEl = document.getElementById("stageTxt");

function setAllVisible(vis){
  nodes.forEach(function(n){ n.visible = vis; });
  edges.forEach(function(e){ e.visible = vis; });
}

function showStageLabel(stage){
  stageVerEl.textContent = stage.ver;
  stageTxtEl.textContent = stage.label;
  stageLabelEl.classList.add("show");
}
function hideStageLabel(){
  stageLabelEl.classList.remove("show");
}

function popInNode(n, delay){
  // scale spring pop: animate radius from 0 -> r with slight overshoot,
  // optionally delayed so a stage's nodes land staggered instead of at once
  var startTime = performance.now() + (delay||0);
  var dur = 480;
  var baseR = n.r;
  n.circleEl.setAttribute("r", 0.5);
  function step(now){
    var t = (now-startTime)/dur;
    if(t < 0){ requestAnimationFrame(step); return; }
    t = Math.min(1, t);
    // spring ease-out-back approximation
    var c1 = 1.70158, c3 = c1+1;
    var eased = 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
    var scale = Math.max(0, eased);
    n.circleEl.setAttribute("r", Math.max(0.5, baseR*scale));
    if(t<1){ requestAnimationFrame(step); }
    else { n.circleEl.setAttribute("r", baseR); }
  }
  requestAnimationFrame(step);
}

function runGrowReplay(){
  if(growRunning) return;
  growRunning = true;
  closePanel();
  document.getElementById("growBtn").disabled = true;

  // start with nothing visible
  setAllVisible(false);
  positionAll();

  var stageIdx = 0;
  var cumulativeVers = [];

  function runStage(){
    if(stageIdx>=STAGES.length){
      hideStageLabel();
      growRunning = false;
      document.getElementById("growBtn").disabled = false;
      selectedId = null;
      updateEdgeHighlight();
      // final ease camera back to a full fit-to-bounds view
      var fit = KIOSK ? computeFitHomes(70) : computeFit();
      easeCameraTo(fit.x, fit.y, fit.scale, 700);
      if(onGrowComplete) onGrowComplete();
      return;
    }
    var stage = STAGES[stageIdx];
    showStageLabel(stage);

    var born = performance.now();
    var newlyVisible = [];
    nodes.forEach(function(n){
      if(!n.visible && stage.vers.indexOf(n.ver)!==-1){
        n.visible = true;
        newlyVisible.push(n);
      }
    });
    edges.forEach(function(e){
      var a = nodeById[e.a], b = nodeById[e.b];
      if(!e.visible && a.visible && b.visible){
        e.visible = true;
        // edges fade + trace in just behind their nodes, loosely scattered
        e.bornAt = born + 380 + Math.random()*520;
        if(KIOSK) e.traceStart = e.bornAt;
      }
    });

    // reposition newly visible nodes near their home before pop so physics can settle them
    newlyVisible.forEach(function(n){
      n.x = n.homeX + (Math.random()-0.5)*40;
      n.y = n.homeY + (Math.random()-0.5)*40;
      n.vx=0; n.vy=0;
    });

    positionAll();
    // staggered pops: each node in the stage lands a beat after the last
    newlyVisible.forEach(function(n, i){
      var d = Math.min(i*70, 950);
      n.bornAt = born + d;
      popInNode(n, d);
      if(KIOSK && kioskFxBurst) kioskFxBurst(n, born + d);
    });

    // kiosk: choreograph the camera to hug the graph as it grows
    if(KIOSK){
      var f = computeFitHomes(90);
      easeCameraTo(f.x, f.y, Math.min(f.scale, 1.12), 1400);
    }

    stageIdx++;
    setTimeout(runStage, STAGE_MS);
  }

  runStage();
}

function fitScale(){
  return computeFit().scale;
}

/* Generic fit-to-bounds: compute the bounding box of currently-visible nodes
   and return a camera transform (world center + scale) that fits it in the
   current window with ~40px screen-space padding on all sides. Used on
   initial load and on Reset so mobile (narrower, taller viewport) and
   desktop both frame the whole graph without clipping. */
function computeFit(padding){
  padding = (padding===undefined) ? 40 : padding;
  var an = nodes.filter(function(n){ return n.visible; });
  if(an.length===0){ return { x:0, y:0, scale:0.72 }; }
  var minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  an.forEach(function(n){
    var pad = n.r + 20; // room for label text below/around each node
    if(n.x-pad<minX) minX=n.x-pad;
    if(n.x+pad>maxX) maxX=n.x+pad;
    if(n.y-pad<minY) minY=n.y-pad;
    if(n.y+pad>maxY) maxY=n.y+pad;
  });
  var bw = Math.max(1, maxX-minX);
  var bh = Math.max(1, maxY-minY);
  var cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  var availW = Math.max(50, W - padding*2);
  var availH = Math.max(50, H - padding*2);
  var scale = Math.min(availW/bw, availH/bh);
  scale = Math.max(0.15, Math.min(1.4, scale));
  return { x:cx, y:cy, scale:scale };
}

/* Kiosk camera fit: like computeFit but over the visible nodes' HOME
   (settle-target) positions. Live positions briefly scatter when a stage
   of new nodes drops in (repulsion spike before the springs win), which
   made live-bounds fits collapse to the min-scale clamp mid-grow. Homes
   are where the layout settles, so the framing is always right. */
function computeFitHomes(padding){
  padding = (padding===undefined) ? 90 : padding;
  var an = nodes.filter(function(n){ return n.visible; });
  if(an.length===0){ return { x:0, y:0, scale:0.72 }; }
  var minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  an.forEach(function(n){
    var pad = n.r + 55; // room for label + physics wander around home
    if(n.homeX-pad<minX) minX=n.homeX-pad;
    if(n.homeX+pad>maxX) maxX=n.homeX+pad;
    if(n.homeY-pad<minY) minY=n.homeY-pad;
    if(n.homeY+pad>maxY) maxY=n.homeY+pad;
  });
  var bw = Math.max(1, maxX-minX), bh = Math.max(1, maxY-minY);
  var scale = Math.min(Math.max(50,W-padding*2)/bw, Math.max(50,H-padding*2)/bh);
  return { x:(minX+maxX)/2, y:(minY+maxY)/2, scale: Math.max(0.15, Math.min(1.4, scale)) };
}

document.getElementById("growBtn").addEventListener("click", runGrowReplay);

/* =========================================================
   10. RESET
   ========================================================= */

function resetAll(){
  growRunning = false;
  document.getElementById("growBtn").disabled = false;
  hideStageLabel();
  closePanel();
  setAllVisible(true);
  edges.forEach(function(e){
    e.bornAt = 0; e.traceStart = 0;
    e.el.removeAttribute("stroke-dasharray");
    e.el.removeAttribute("stroke-dashoffset");
  });
  nodes.forEach(function(n){
    var jitterX = (hashStr(n.id) % 200 - 100);
    var jitterY = ((hashStr(n.id+"y")) % 200 - 100);
    n.x = n.homeX + jitterX*0.3;
    n.y = n.homeY + jitterY*0.3;
    n.vx=0; n.vy=0; n.fixed=false; n.bornAt = 0;
    n.circleEl.setAttribute("r", n.r);
  });
  prewarm(140);
  positionAll();
  var fit = computeFit();
  easeCameraTo(fit.x, fit.y, fit.scale, 500);
}
document.getElementById("resetBtn").addEventListener("click", resetAll);

/* =========================================================
   10b. KIOSK AMBIENT LOOP + FX (?loop / ?kiosk only)
   ========================================================= */
if(KIOSK){
  var KIOSK_HOLD_MS = 18000;    // full-map dwell between grow cycles
  var KIOSK_RESUME_MS = 45000;  // resume this long after someone interacts
  var kioskTimer = null, kioskResumeTimer = null, kioskPaused = false;
  var holdActive = false, holdStart = 0, driftBase = null;

  /* ---- FX layer: fixed pools (no per-cycle allocation, no leaks) ---- */
  var fxLayer = document.createElementNS("http://www.w3.org/2000/svg","g");
  viewport.appendChild(fxLayer);

  var PARTICLE_POOL = 64, particles = [];
  (function(){
    for(var i=0;i<PARTICLE_POOL;i++){
      var c = document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute("r","1.7"); c.style.display="none";
      fxLayer.appendChild(c);
      particles.push({el:c, active:false});
    }
  })();
  var pendingBursts = [];
  kioskFxBurst = function(n, at){ pendingBursts.push({n:n, at:at}); };

  function fireBurst(n){
    for(var i=0;i<7;i++){
      var p = null;
      for(var j=0;j<PARTICLE_POOL;j++){ if(!particles[j].active){ p=particles[j]; break; } }
      if(!p) return;
      var ang = Math.random()*Math.PI*2;
      var sp = 18 + Math.random()*26;
      p.active = true;
      p.x = n.x; p.y = n.y;
      p.vx = Math.cos(ang)*sp; p.vy = Math.sin(ang)*sp;
      p.born = performance.now(); p.life = 550 + Math.random()*350;
      p.el.setAttribute("fill", GROUP_COLOR[n.group].glow);
      p.el.style.display = "";
    }
  }

  var PULSE_POOL = 14, pulses = [];
  (function(){
    for(var i=0;i<PULSE_POOL;i++){
      var c = document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute("r","2.6"); c.style.display="none";
      fxLayer.appendChild(c);
      pulses.push({el:c, active:false});
    }
  })();
  var nextPulseAt = 0;
  var EDGE_COLOR = { data:"var(--edge-data)", workaround:"var(--edge-workaround)", route:"var(--edge-route)" };

  function spawnPulse(now){
    var vis = edges.filter(function(e){ return e.visible && !e.traceStart; });
    if(!vis.length) return;
    var p = null;
    for(var j=0;j<PULSE_POOL;j++){ if(!pulses[j].active){ p=pulses[j]; break; } }
    if(!p) return;
    var e = vis[(Math.random()*vis.length)|0];
    p.active = true; p.edge = e; p.t0 = now; p.dur = 1100 + Math.random()*700;
    p.el.setAttribute("fill", EDGE_COLOR[e.kind] || "var(--edge-route)");
    p.el.style.display = "";
  }

  /* ---- per-frame FX tick, driven from the main rAF loop ---- */
  kioskTick = function(){
    var now = performance.now();
    var i, e, p;

    // particle bursts that have come due
    for(i=pendingBursts.length-1;i>=0;i--){
      if(now >= pendingBursts[i].at){ fireBurst(pendingBursts[i].n); pendingBursts.splice(i,1); }
    }
    // particles: drift out, decelerate, fade
    for(i=0;i<PARTICLE_POOL;i++){
      p = particles[i];
      if(!p.active) continue;
      var lt = (now - p.born)/p.life;
      if(lt>=1){ p.active=false; p.el.style.display="none"; continue; }
      p.x += p.vx*0.016; p.y += p.vy*0.016;
      p.vx *= 0.94; p.vy *= 0.94;
      p.el.setAttribute("cx", p.x); p.el.setAttribute("cy", p.y);
      p.el.setAttribute("opacity", (1-lt)*0.85);
    }
    // edge trace-in: draw the line from source to target as it is born
    for(i=0;i<edges.length;i++){
      e = edges[i];
      if(!e.traceStart) continue;
      var a=nodeById[e.a], b=nodeById[e.b];
      var L = Math.hypot(b.x-a.x, b.y-a.y) || 1;
      var tt = (now - e.traceStart)/700;
      if(tt>=1){
        e.traceStart = 0;
        e.el.removeAttribute("stroke-dasharray");
        e.el.removeAttribute("stroke-dashoffset");
        continue;
      }
      var ease = tt<=0 ? 0 : 1-Math.pow(1-tt,3);
      e.el.setAttribute("stroke-dasharray", L);
      e.el.setAttribute("stroke-dashoffset", L*(1-ease));
    }
    // travelling signal pulses along edges — the map's data paths, alive
    if(now >= nextPulseAt && !document.hidden){
      spawnPulse(now);
      nextPulseAt = now + 380 + Math.random()*520;
    }
    for(i=0;i<PULSE_POOL;i++){
      p = pulses[i];
      if(!p.active) continue;
      e = p.edge;
      var pt = (now - p.t0)/p.dur;
      if(pt>=1 || !e.visible){ p.active=false; p.el.style.display="none"; continue; }
      var a2=nodeById[e.a], b2=nodeById[e.b];
      var ps = pt*pt*(3-2*pt); // smoothstep along the edge
      p.el.setAttribute("cx", a2.x + (b2.x-a2.x)*ps);
      p.el.setAttribute("cy", a2.y + (b2.y-a2.y)*ps);
      p.el.setAttribute("opacity", Math.sin(Math.PI*pt)*0.9);
    }
    // hold phase only: node breathe + slow Ken Burns camera drift
    if(holdActive && !kioskPaused && !growRunning){
      var ht = (now - holdStart)/1000;
      var ramp = Math.min(1, Math.max(0, (ht-0.9)/2)); // wait out the fit ease, then ease in
      if(ramp>0){
        for(i=0;i<nodes.length;i++){
          var nn = nodes[i];
          if(!nn.visible || nn.group==="hub") continue;
          nn.circleEl.setAttribute("r", nn.r * (1 + 0.06*ramp*Math.sin(ht*1.1 + nn.driftP1)));
        }
        if(!driftBase) driftBase = { x:camX, y:camY, s:camScale };
        camX = driftBase.x + Math.sin(ht*0.21)*26*ramp;
        camY = driftBase.y + Math.sin(ht*0.16)*18*ramp;
        camScale = driftBase.s * (1 + 0.028*ramp*Math.sin(ht*0.13));
        applyTransform();
      }
    }
  };

  /* ---- cycle control ---- */
  var startKioskCycle = function(){
    kioskTimer = null;
    if(kioskPaused || growRunning) return;
    // re-read the viewport each cycle so the framing self-corrects after
    // fullscreen toggles, TV mirroring, or resolution changes mid-evening
    W = window.innerWidth || W; H = window.innerHeight || H;
    holdActive = false; driftBase = null;
    svg.style.opacity = "0";               // graceful fade-out of the old map
    setTimeout(function(){
      if(kioskPaused){ svg.style.opacity = "1"; return; }
      runGrowReplay();                     // clears the canvas immediately...
      svg.style.opacity = "1";             // ...then fade back in as stage 1 pops
    }, 1100);
  };
  var scheduleKioskCycle = function(delay){
    if(kioskTimer) clearTimeout(kioskTimer);
    kioskTimer = setTimeout(startKioskCycle, delay);
  };
  onGrowComplete = function(){
    holdActive = true; holdStart = performance.now(); driftBase = null;
    scheduleKioskCycle(KIOSK_HOLD_MS);
  };

  // anyone touching the map pauses the loop; it resumes on its own
  var kioskInteracted = function(){
    kioskPaused = true; holdActive = false; driftBase = null;
    nodes.forEach(function(n){ if(n.visible) n.circleEl.setAttribute("r", n.r); });
    if(kioskTimer){ clearTimeout(kioskTimer); kioskTimer = null; }
    if(kioskResumeTimer) clearTimeout(kioskResumeTimer);
    kioskResumeTimer = setTimeout(function(){
      kioskPaused = false;
      if(!growRunning) scheduleKioskCycle(2500);
    }, KIOSK_RESUME_MS);
  };
  svg.addEventListener("pointerdown", kioskInteracted, true);
  svg.addEventListener("wheel", kioskInteracted, { passive:true, capture:true });

  // per-node phases for idle drift + breathe
  nodes.forEach(function(n){
    n.driftP1 = hashStr(n.id) * 0.05;
    n.driftP2 = hashStr(n.id + "~") * 0.05;
  });

  // hide the cursor once the pointer goes quiet
  var cursorTimer = null;
  var pokeCursor = function(){
    document.body.classList.remove("cursor-idle");
    if(cursorTimer) clearTimeout(cursorTimer);
    cursorTimer = setTimeout(function(){ document.body.classList.add("cursor-idle"); }, 4000);
  };
  window.addEventListener("pointermove", pokeCursor, { passive:true });
  pokeCursor();

  // opening beat: show the finished map briefly, then start the first cycle
  scheduleKioskCycle(6000);
}

/* =========================================================
   11. RESIZE
   ========================================================= */
window.addEventListener("resize", function(){
  W = window.innerWidth; H = window.innerHeight;
  applyTransform();
});

/* =========================================================
   12. INIT
   ========================================================= */
/* =========================================================
   node hover preview card — low-commitment peek at a node's
   blurb without opening the full side panel (click still does
   that, unchanged). Delegated listeners + one reused element,
   so 87 nodes cost nothing extra. Fine-pointer devices only.
   ========================================================= */
var hoverCard = document.getElementById("hoverCard");
var hoverId = null, hoverTimer = null;
var HOVER_DELAY = 180;   // absorbs quick sweeps across the graph

function escHtml(t){
  return String(t == null ? "" : t).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
  });
}

function hoverCardHTML(n){
  var st = STATUS_COLOR[n.status] || "var(--text-main)";
  var neigh = (neighbors[n.id] || []).length;
  return '<div class="hc-head">' +
    '<span class="hc-dot" style="background:' + GROUP_COLOR[n.group].fill + '"></span>' +
    '<span class="hc-name">' + escHtml(n.label) + '</span>' +
    '<span class="hc-status" style="color:' + st + ';border:1px solid ' + st + '">' + escHtml(n.status) + '</span>' +
    '</div>' +
    '<div class="hc-blurb">' + escHtml(n.blurb) + '</div>' +
    '<div class="hc-meta"><span>Added in ' + escHtml(VER_LABEL[n.ver] || ("v" + n.ver)) + '</span>' +
    '<span>' + neigh + (neigh === 1 ? " connection" : " connections") + '</span></div>' +
    '<div class="hc-hint">Click the node for full details</div>';
}

function placeHoverCard(){
  var n = nodeById[hoverId];
  if(!n || !n.visible){ hideHoverCard(); return; }
  var p = worldToScreen(n.x, n.y);
  var off = n.r * camScale + 14;
  var cw = hoverCard.offsetWidth, ch = hoverCard.offsetHeight;
  var x = p.x + off, y = p.y - ch / 2;
  if(x + cw > W - 12) x = p.x - off - cw;   // flip to the left near the edge
  x = Math.max(12, x);
  y = Math.max(12, Math.min(H - ch - 12, y));
  hoverCard.style.left = x + "px";
  hoverCard.style.top = y + "px";
}

function showHoverCard(id){
  var n = nodeById[id];
  if(!n) return;
  hoverId = id;
  hoverCard.innerHTML = hoverCardHTML(n);
  hoverCard.classList.add("show");
  hoverCard.setAttribute("aria-hidden", "false");
  placeHoverCard();
}

function hideHoverCard(){
  if(hoverTimer){ clearTimeout(hoverTimer); hoverTimer = null; }
  if(hoverId === null && !hoverCard.classList.contains("show")) return;
  hoverId = null;
  hoverCard.classList.remove("show");
  hoverCard.setAttribute("aria-hidden", "true");
}

if(window.matchMedia("(pointer: fine)").matches){
  nodeLayer.addEventListener("pointerover", function(evt){
    var g = evt.target.closest ? evt.target.closest(".node-group") : null;
    if(!g) return;
    if(isPanning || dragNode) return;
    var id = g.getAttribute("data-id");
    if(id === hoverId) return;
    if(hoverTimer) clearTimeout(hoverTimer);
    hoverTimer = setTimeout(function(){ hoverTimer = null; showHoverCard(id); }, HOVER_DELAY);
  });
  nodeLayer.addEventListener("pointerout", function(evt){
    var g = evt.target.closest ? evt.target.closest(".node-group") : null;
    if(!g) return;
    if(evt.relatedTarget && g.contains(evt.relatedTarget)) return; // circle<->label
    hideHoverCard();
  });
  /* any pan / drag / zoom kills the preview immediately */
  svg.addEventListener("pointerdown", hideHoverCard, true);
  svg.addEventListener("wheel", hideHoverCard, { passive:true });
}

updateTicker();
updateSubtitle();
prewarm(220); // pre-warm before first paint so it doesn't explode
var initFit = computeFit();
camX = initFit.x; camY = initFit.y; camScale = initFit.scale;
applyTransform();
positionAll();
updateEdgeHighlight();
requestAnimationFrame(frame);

})();
</script>
<script>
/* Pointer-depth on the brand glow layer — a light parallax touch suited to
   a full-viewport canvas (no page scroll here). Lerped, tiny amplitude, and
   skipped entirely under prefers-reduced-motion or without a fine pointer. */
document.getElementById("themeBtn").addEventListener("click", function () {
  TMTheme.toggle();
});
document.getElementById("lockBtn").addEventListener("click", function () {
  TMAuth.logout(); location.href = "index.html";
});
(function () {
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  if (!window.matchMedia("(pointer: fine)").matches) return;
  var el = document.getElementById("depthGlow");
  if (!el) return;
  var tx = 0, ty = 0, cx = 0, cy = 0, raf = null;
  var AMP = 18; // max px drift — depth cue, not a distraction
  function tick() {
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    el.style.transform = "translate3d(" + cx.toFixed(2) + "px," + cy.toFixed(2) + "px,0)";
    if (Math.abs(tx - cx) + Math.abs(ty - cy) > 0.1) { raf = requestAnimationFrame(tick); }
    else { raf = null; }
  }
  window.addEventListener("pointermove", function (e) {
    tx = (e.clientX / window.innerWidth - 0.5) * -2 * AMP;
    ty = (e.clientY / window.innerHeight - 0.5) * -2 * AMP;
    if (!raf) raf = requestAnimationFrame(tick);
  }, { passive: true });
})();
</script>
