<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enter password — Travis Morrow</title>
<meta name="robots" content="noindex, nofollow">
<script src="theme.js"></script>
<script>TMTheme.init();</script>
<style>
  :root{
    /* NSS / AFAM brand theme — NSS Red #B92732, AFAM Red #B62025,
       charcoal #212121 (Assets/BRAND-GUIDELINES.md). --accent-bright is a
       lightened brand red for small text on dark. */
    --bg:#141414; --border:rgba(255,255,255,0.08);
    --text:#d2d2d2; --dim:#9c9c9c; --bright:#f2f2f2;
    --accent:#B92732; --accent-2:#B62025; --accent-bright:#de5964;
    --error:#f85149; --ok:#3fb950;
    --chip-bg:rgba(255,255,255,0.04);
  }
  /* honors the site-wide stored theme; no toggle here — it's a
     pass-through page and the chrome should stay minimal */
  :root[data-theme="light"]{
    --bg:#F2F2F0; --border:#D9DBDE;
    --text:#33363B; --dim:#6B6E73; --bright:#111318;
    --accent-bright:#B92732; --error:#CF222E; --ok:#1A7F37;
    --chip-bg:rgba(0,0,0,0.035);
  }
  :root[data-theme="light"] body::before{ opacity:.4; }
  :root[data-theme="light"] .card{ background:#FFFFFF; box-shadow:0 8px 30px rgba(16,18,20,0.10); }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 38%,
      rgba(185,39,50,0.12) 0%, rgba(182,32,37,0.05) 32%, rgba(20,20,20,0) 64%);
  }
  .card{
    position:relative; z-index:1;
    width:100%; max-width:380px;
    background:rgba(33,33,33,0.6); border:1px solid var(--border);
    border-radius:16px; padding:34px 30px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
    text-align:center;
  }
  .lock{
    width:46px; height:46px; margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
    border-radius:12px; color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 4px 16px rgba(185,39,50,0.28);
  }
  .lock svg{ width:22px; height:22px; }
  h1{ margin:0 0 6px; font-size:19px; font-weight:600; color:var(--bright); }
  p.sub{ margin:0 0 22px; font-size:13.5px; color:var(--dim); line-height:1.5; }
  form{ display:flex; flex-direction:column; gap:12px; }
  input[type=password]{
    width:100%; padding:13px 14px; font-size:15px;
    color:var(--bright); background:var(--chip-bg);
    border:1px solid var(--border); border-radius:10px; outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type=password]:focus{
    border-color:var(--accent-bright);
    box-shadow:0 0 0 3px rgba(185,39,50,0.20);
  }
  button{
    padding:13px 14px; font-size:15px; font-weight:600; cursor:pointer;
    color:#fff; border:none; border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 6px 20px rgba(185,39,50,0.25);
    transition:transform .12s ease, filter .12s ease;
  }
  button:hover{ filter:brightness(1.1); }
  button:active{ transform:translateY(1px); }
  button:disabled{ opacity:.6; cursor:default; }
  .msg{ min-height:18px; margin-top:12px; font-size:13px; }
  .msg.error{ color:var(--error); }
  .msg.ok{ color:var(--ok); } /* success stays green — brand red would read as an error */
  .hint{ margin-top:18px; font-size:11.5px; color:var(--dim); opacity:.75; }
  .shake{ animation:shake .4s; }
  @keyframes shake{
    0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-7px);}
    40%,80%{transform:translateX(7px);}
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="lock" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="10" width="16" height="10" rx="2"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
      </svg>
    </div>
    <h1>This area is private</h1>
    <p class="sub">Enter the password to view the memory map.</p>

    <form id="loginForm" autocomplete="off">
      <input id="pw" type="password" placeholder="Password" autofocus
             aria-label="Password" autocomplete="current-password">
      <button id="submitBtn" type="submit">Unlock</button>
    </form>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>
    <p class="hint">Access is granted for this browser session only.</p>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // If already unlocked this session, skip straight in.
    if (TMAuth.isAuthed()) {
      location.replace(nextTarget());
    }

    var form = document.getElementById("loginForm");
    var pw = document.getElementById("pw");
    var btn = document.getElementById("submitBtn");
    var msg = document.getElementById("msg");
    var card = document.getElementById("card");

    // Only allow relative same-folder targets from ?next (no open redirects).
    function nextTarget() {
      var params = new URLSearchParams(location.search);
      var next = params.get("next") || "";
      if (next && /^[A-Za-z0-9._-]+\.html$/.test(next)) return next;
      return (window.TM_CONFIG && TM_CONFIG.PROTECTED_PAGE) || "memory-map.html";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      msg.className = "msg";
      msg.textContent = "";
      btn.disabled = true;
      try {
        var ok = await TMAuth.login(pw.value);
        if (ok) {
          msg.className = "msg ok";
          msg.textContent = "Unlocked — loading…";
          location.replace(nextTarget());
        } else {
          msg.className = "msg error";
          msg.textContent = "Incorrect password. Try again.";
          card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake");
          pw.value = ""; pw.focus();
          btn.disabled = false;
        }
      } catch (err) {
        msg.className = "msg error";
        msg.textContent = "This browser blocked the check. Try a modern browser over https.";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
