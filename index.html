<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travis Morrow</title>
<meta name="description" content="Travis Morrow — personal site.">
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg:#0d1117;
    --panel:rgba(255,255,255,0.03);
    --border:rgba(255,255,255,0.08);
    --text:#c9d1d9;
    --dim:#8b98a5;
    --bright:#e6edf3;
    --accent:#4da3ff;
    --accent-2:#22b8cf;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100%;
  }
  /* soft radial glow behind the hero */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 32%,
      rgba(77,163,255,0.10) 0%, rgba(34,184,207,0.05) 30%, rgba(13,17,23,0) 62%);
  }
  main{
    position:relative; z-index:1;
    flex:1 1 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:48px 24px;
  }
  .eyebrow{
    text-transform:uppercase; letter-spacing:.22em; font-size:12px;
    color:var(--accent-2); margin:0 0 20px;
  }
  h1{
    margin:0; font-weight:600; line-height:1.05; color:var(--bright);
    font-size:clamp(40px,9vw,76px); letter-spacing:-0.02em;
  }
  .tagline{
    margin:20px auto 0; max-width:34rem; color:var(--dim);
    font-size:clamp(15px,2.4vw,18px); line-height:1.6;
  }
  .cta{
    display:inline-flex; align-items:center; gap:.6em;
    margin-top:40px; padding:14px 26px;
    border-radius:12px; text-decoration:none; font-weight:600; font-size:16px;
    color:#04121f; background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 8px 30px rgba(77,163,255,0.28);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .cta:hover{ transform:translateY(-2px); box-shadow:0 12px 38px rgba(77,163,255,0.38); filter:brightness(1.05); }
  .cta:active{ transform:translateY(0); }
  .cta svg{ width:18px; height:18px; }
  .lock-note{
    margin-top:18px; font-size:12.5px; color:var(--dim);
    display:inline-flex; align-items:center; gap:6px;
  }
  .lock-note svg{ width:13px; height:13px; opacity:.8; }
  footer{
    position:relative; z-index:1;
    padding:22px; text-align:center; color:var(--dim);
    font-size:12px; border-top:1px solid var(--border);
  }
  a.quiet{ color:var(--dim); text-decoration:none; border-bottom:1px solid transparent; }
  a.quiet:hover{ color:var(--text); border-bottom-color:var(--border); }
</style>
</head>
<body>
  <main>
    <p class="eyebrow">travismorrow.com</p>
    <h1>Travis&nbsp;Morrow</h1>
    <p class="tagline">
      A working record of what we've built — an interactive map of the systems,
      workflows, and automations behind the operation.
    </p>

    <a class="cta" href="memory-map.html">
      Enter the memory map
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </a>

    <p class="lock-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="10" width="16" height="10" rx="2"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
      </svg>
      Password required
    </p>
  </main>

  <footer>
    &copy; <span id="yr">2026</span> Travis Morrow &middot; Private demo
  </footer>

  <script>
    // Keep the year fresh without a build step.
    document.getElementById("yr").textContent = new Date().getFullYear();
  </script>
</body>
</html>
